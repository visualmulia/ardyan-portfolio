# Decap CMS Configuration (Git-Based)
# Learn more at https://decapcms.org/docs/configuration-options/

backend:
  name: github
  repo: visualmulia/ardyan-portfolio
  branch: main
  base_url: https://www.ardyan.web.id
  auth_endpoint: api/auth

media_folder: public/assets/uploads
public_folder: /assets/uploads

collections:
  - name: "projects_collection"
    label: "Portfolio Management"
    files:
      - file: "public/data/projects.json"
        name: "projects"
        label: "Portfolio Projects List"
        format: "json"
        fields:
          - name: "items"
            label: "Projects"
            label_singular: "Project"
            widget: "list"
            fields:
              - { label: "Project ID (slug)", name: "id", widget: "string", hint: "Unique lowercase identifier (e.g., auramart)" }
              - { label: "Project Title", name: "title", widget: "string" }
              - { label: "Category Key", name: "category", widget: "select", options: [{label: "SaaS & Web App", value: "web-saas"}, {label: "Android App", value: "android"}, {label: "Automation & Tool", value: "automation"}] }
              - { label: "Category Label (Visible)", name: "categoryLabel", widget: "string", hint: "e.g., SaaS & Web App" }
              - { label: "Short Card Description", name: "shortDescription", widget: "string" }
              - { label: "Detailed Description (Modal)", name: "description", widget: "text" }
              - { label: "Project Image", name: "image", widget: "image" }
              - { label: "Tech Stack Tags", name: "techStack", widget: "list", field: { label: "Tech Tag", name: "tech", widget: "string" } }
              - label: "Business Impact Metrics"
                name: "metrics"
                widget: "object"
                fields:
                  - { label: "Metric 1 Title (e.g., Checkout Speed)", name: "m1_key", widget: "string" }
                  - { label: "Metric 1 Value (e.g., +140% Faster)", name: "m1_val", widget: "string" }
                  - { label: "Metric 2 Title (e.g., Active Outlets)", name: "m2_key", widget: "string" }
                  - { label: "Metric 2 Value (e.g., 15+ Stores)", name: "m2_val", widget: "string" }
                  - { label: "Metric 3 Title (e.g., System Uptime)", name: "m3_key", widget: "string" }
                  - { label: "Metric 3 Value (e.g., 99.99%)", name: "m3_val", widget: "string" }
              - { label: "Live Demo URL", name: "liveUrl", widget: "string", required: false }
              - { label: "GitHub URL", name: "githubUrl", widget: "string", required: false }
              - { label: "Delivery Time", name: "deliveryTime", widget: "string", hint: "e.g., Built in 14 days" }
              - { label: "Methodology", name: "method", widget: "string", hint: "e.g., AI-Assisted, Human-Validated" }
              - { label: "Outcome Result", name: "result", widget: "string", hint: "e.g., 15 stores onboarded, 0 downtime" }

  - name: "publications_collection"
    label: "Publications Management"
    folder: "src/content/publications"
    create: true
    slug: "{{slug}}"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", hint: "Unique URL friendly path (e.g., how-restaurants-use-ai)" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Category", name: "category", widget: "select", options: ["Design Thinking", "Ai Today"] }
      - { label: "Short Description", name: "description", widget: "text" }
      - { label: "Cover Image", name: "image", widget: "image" }
      - { label: "Body", name: "body", widget: "markdown" }
